name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prev=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -n1 || true)
          {
            echo "## Changes"
            echo
            if [ -n "$prev" ]; then
              echo "Since \`$prev\`:"
              echo
              git log --pretty=format:'- %s' "$prev..$TAG"
            else
              echo "Initial release."
            fi
          } > notes.md
          echo "path=notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.path }}
        run: gh release create "$TAG" --title "$TAG" --notes-file "$NOTES"
