repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - hypothesis>=6.152.1
          - mcp>=1.2.0
          - pydantic>=2.12.5
          - pytest>=9.0.3
          - pyyaml>=6.0.3
          - requests>=2.33.1
          - types-PyYAML>=6.0.12
          - types-requests>=2.33.0

  - repo: local
    hooks:
      - id: trufflehog
        name: trufflehog (secret scan, offline)
        description: Detect secrets in staged changes via local trufflehog binary (no API verification).
        entry: trufflehog git file://. --since-commit HEAD --no-verification --no-update --fail
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: coily-trailer
        name: coily audit-log trailer
        description: Append Audit-log trailers to the commit message based on coily's audit log for this repo.
        entry: coily git trailer-hook
        language: system
        stages: [prepare-commit-msg]
        always_run: true
        require_serial: true

  # BEGIN managed by agentic-os/scripts/apply-agentic-os-hooks.py
  - repo: https://github.com/coilyco-flight-deck/agentic-os
    rev: v0.11.1
    hooks:
      - id: catalog-doc-size
      - id: catalog-trifecta
      - id: documentation-layout
      - id: context-load-points
      - id: code-comments
      - id: catalog-block-present
      - id: validate-skills
      - id: dead-cross-links
      - id: repo-pointer-skills
      - id: closes-issue
      - id: conventional-commit
      - id: trufflehog
      - id: coily-trailer
  # END managed by agentic-os/scripts/apply-agentic-os-hooks.py
